<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="tg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#020617" />
  <!-- Glowing ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1e293b" stroke-width="8" />
  <!-- Left/Top Link Loop -->
  <path d="M190 190 C140 240, 140 320, 190 370 C240 420, 320 420, 370 370 L310 310 C290 330, 260 330, 240 310 C220 290, 220 260, 240 240 L190 190 Z" fill="url(#tg-grad)" filter="url(#glow)" />
  <!-- Right/Bottom Link Loop -->
  <path d="M322 322 C372 272, 372 192, 322 142 C272 92, 192 92, 142 142 L202 202 C222 182, 252 182, 272 202 C292 222, 292 252, 272 272 L322 322 Z" fill="url(#tg-grad)" filter="url(#glow)" />
  <!-- Connecting Bar -->
  <rect x="226" y="226" width="60" height="60" rx="12" fill="url(#tg-grad)" transform="rotate(45 256 256)" filter="url(#glow)" />
</svg>
